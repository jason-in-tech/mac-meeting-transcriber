name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (macos-14, Python 3.13)
    # macos-14 = Apple Silicon. The package itself is Apple-Silicon only at
    # runtime (mlx-whisper), but the unit tests are pure-Python and platform-
    # neutral; we still run on macos-14 so the install step matches reality.
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync project + dev deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check src tests examples

      - name: Pytest
        run: uv run pytest -v
